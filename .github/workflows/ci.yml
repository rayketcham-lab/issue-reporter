name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: "Lint — ruff"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install ruff
          .venv/bin/python -m ruff check .

  lint-shell:
    name: "Lint — shellcheck"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck issue-reporter.sh

  test-ubuntu2:
    name: "Test — Ubuntu2"
    runs-on: [self-hosted, Linux, X64, ubuntu2]
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv and run tests
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install pytest
          .venv/bin/python -m pytest tests/ -v

  test-linux:
    name: "Test — Linux"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up venv and run tests
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install pytest
          .venv/bin/python -m pytest tests/ -v

  test-windows:
    name: "Test — Windows"
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install pytest
          python -m pytest tests/ -v
