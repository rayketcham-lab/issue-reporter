name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: "Lint — ruff"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run ruff
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install ruff
          .venv/bin/python -m ruff check .

  lint-shell:
    name: "Lint — shellcheck"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install and run shellcheck
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install shellcheck-py
          .venv/bin/shellcheck issue-reporter.sh

  test-ubuntu2:
    name: "Test — Ubuntu2"
    runs-on: [self-hosted, Linux, X64, ubuntu2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up venv and run tests
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install pytest
          .venv/bin/python -m pytest tests/ -v

  test-linux:
    name: "Test — Linux"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up venv and run tests
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install pytest
          .venv/bin/python -m pytest tests/ -v

  test-windows:
    name: "Test — Windows"
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install pytest
          python -m pytest tests/ -v
